services:
  pickmaster-editor:
    image: ghcr.io/joe2824/pickmaster-editor:latest
    container_name: pickmaster-editor
    restart: unless-stopped
    ports:
      - "8080:80"
    
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    
