<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PickMaster Twin - Fast Pattern Editor (3D Version)</title>
    <script type="module" src="/src/main.js"></script>
    <link href="/src/style.css" rel="stylesheet" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="apple-touch-icon" href="/pwa-192x192.png" />
    <style>
      [x-cloak] {
        display: none !important;
      }
      .no-select {
        user-select: none;
      }
      body {
        overflow: hidden;
      }
      #threejs-container {
        width: 100%;
        height: 100%;
        outline: none;
      }
    </style>
  </head>
  <body
    class="bg-gray-50 h-screen flex flex-col font-sans"
    x-data="pickmasterApp()"
    @keydown.window="handleKeyDown($event)"
  >
    <header
      class="bg-[#3C3030] text-white p-4 shadow-md flex justify-between items-center z-10"
    >
      <div class="flex space-x-3 items-center">
        <h1 class="text-xl font-bold">PickMaster Twin - Fast Pattern Editor (3D)</h1>
      </div>

      <div class="flex items-center space-x-4">
        <div
          x-show="lastSaved"
          x-transition
          class="text-blue-200 text-xs flex items-center gap-1.5 bg-blue-700 px-2 py-1 rounded"
        >
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M5 13l4 4L19 7"
            ></path>
          </svg>
          <span>Lokal gespeichert: <span x-text="lastSaved"></span></span>
        </div>

        <div class="flex space-x-2">
          <input
            type="file"
            id="fileInput"
            accept=".json"
            @change="loadFile"
            class="hidden"
          />
          <input
            type="file"
            id="itemFileInput"
            accept=".json"
            multiple
            @change="loadItemFiles"
            class="hidden"
          />

          <button
            x-show="jsonData"
            @click="document.getElementById('itemFileInput').click()"
            class="cursor-pointer bg-purple-500 hover:bg-purple-400 px-4 py-2 rounded shadow transition text-sm"
          >
            Item laden
          </button>
          <button
            x-show="jsonData"
            @click="document.getElementById('fileInput').click()"
            class="cursor-pointer bg-blue-500 hover:bg-blue-400 px-4 py-2 rounded shadow transition text-sm"
          >
            Container laden
          </button>
          <button
            x-show="jsonData"
            @click="saveFile"
            class="cursor-pointer bg-green-500 hover:bg-green-400 px-4 py-2 rounded shadow transition text-sm flex items-center gap-3"
          >
            <span class="font-semibold">Exportieren</span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 overflow-hidden flex" x-show="jsonData" x-cloak>
      <div class="w-2/3 p-4 flex flex-col h-full border-r border-gray-200 bg-gray-100">
        <div class="flex justify-between items-center mb-2">
          <h2 class="text-lg font-semibold flex items-center gap-4">
            <span
              >Visualisierung (<span x-text="width"></span> x
              <span x-text="height"></span>)</span
            >
            <div class="flex gap-2 text-xs font-normal border-l pl-4 border-gray-300">
              <template x-for="(color, id) in itemColors" :key="id">
                <div
                  @click="toggleVisibility(id)"
                  class="cursor-pointer flex items-center gap-1.5 px-2 py-1 rounded shadow-sm border transition-all duration-200 select-none"
                  :class="isHidden(id) ? 'bg-gray-100 border-dashed border-gray-300 opacity-60' : 'bg-white border-gray-200 hover:bg-gray-50 hover:shadow'"
                  title="Klicken zum Ein-/Ausblenden"
                >
                  <div
                    class="w-3 h-3 rounded-sm transition-colors duration-200"
                    :style="`background-color: ${color.hex}`"
                  ></div>
                  <span
                    class="truncate w-16 transition-all duration-200"
                    :class="isHidden(id) ? 'text-gray-400 line-through' : 'text-gray-700 font-medium'"
                    :title="id"
                    x-text="id"
                  ></span>
                </div>
              </template>
            </div>
          </h2>
          <div class="flex items-center space-x-2">
            <span class="text-xs text-gray-500 font-medium bg-gray-200 px-2 py-1 rounded"
              >Rechtsklick: Kamera drehen | Mausrad: Zoom | Linksklick: Item bewegen</span
            >
            <button
              @click="resetCamera"
              class="bg-gray-300 hover:bg-gray-400 text-gray-700 cursor-pointer px-2.5 py-1 rounded shadow transition text-xs font-medium flex items-center gap-1.5"
            >
              Kamera Reset
            </button>
            <button
              @click="toggleDragMode"
              :class="dragMode ? 'bg-orange-500 hover:bg-orange-600' : 'bg-gray-400 hover:bg-gray-500'"
              class="cursor-pointer text-white px-3 py-1 rounded shadow transition text-xs font-medium flex items-center gap-2"
            >
              <span>Drag & Drop: <span x-text="dragMode ? 'AN' : 'AUS'"></span></span>
            </button>
          </div>
        </div>

        <div
          class="flex-1 overflow-hidden relative rounded shadow-inner border border-gray-400"
          style="background-color: #e5e7eb"
        >
          <div id="threejs-container" x-ref="threeCanvas"></div>

          <div
            x-show="isSelecting"
            class="absolute bg-blue-500/20 border-2 border-blue-500 pointer-events-none z-50"
            :style="`left: ${Math.min(selStartX, selCurrentX)}px; top: ${Math.min(selStartY, selCurrentY)}px; width: ${Math.abs(selCurrentX - selStartX)}px; height: ${Math.abs(selCurrentY - selStartY)}px;`"
          ></div>
        </div>
      </div>

      <div class="w-1/3 flex flex-col h-full bg-white">
        <div
          class="p-4 border-b border-gray-200 bg-gray-50 flex-none"
          style="height: 55%"
        >
          <template x-if="selectedItem">
            <div class="space-y-3 h-full overflow-y-auto pb-4">
              <h2 class="text-lg font-semibold mb-2 text-gray-800">
                Eigenschaften bearbeiten
              </h2>
              <div class="flex flex-col">
                <label class="text-sm font-medium text-gray-600">Slot-ID</label>
                <input
                  type="text"
                  readonly
                  x-model="selectedItem.Id"
                  class="border p-1.5 bg-gray-100 rounded text-xs text-gray-500 focus:outline-none"
                />
              </div>
              <div class="flex flex-col">
                <label class="text-sm font-medium text-gray-700">ItemId</label>
                <select
                  @change="selectedItem.ItemId = $event.target.value; updateThreeMesh(selectedItem)"
                  class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none flex-1 text-sm bg-white"
                >
                  <template x-for="id in uniqueItemIds" :key="id">
                    <option
                      :value="id"
                      x-text="id"
                      :selected="selectedItem && selectedItem.ItemId === id"
                    ></option>
                  </template>
                </select>
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700">X Position</label>
                  <input
                    type="number"
                    step="0.1"
                    x-model.number="selectedItem.X"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700">Y Position</label>
                  <input
                    type="number"
                    step="0.1"
                    x-model.number="selectedItem.Y"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700"
                    >X Rotation (RX°)</label
                  >
                  <input
                    type="number"
                    step="0.1"
                    x-model.number="selectedItem.RX"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700"
                    >Y Rotation (RY°)</label
                  >
                  <input
                    type="number"
                    step="0.1"
                    x-model.number="selectedItem.RY"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700"
                    >Z Rotation (RZ°)</label
                  >
                  <input
                    type="number"
                    step="0.1"
                    x-model.number="selectedItem.RZ"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label
                    class="text-sm font-medium text-gray-700 flex items-center justify-between"
                  >
                    <span>Order</span>
                    <span
                      x-show="hasDuplicateOrder(selectedItem?.Order)"
                      class="text-red-500 text-xs font-bold animate-pulse"
                      title="Diese Nummer ist doppelt vergeben!"
                      >⚠️ DUPLIKAT</span
                    >
                  </label>
                  <input
                    type="number"
                    x-model.number="selectedItem.Order"
                    @input="updateThreeMesh(selectedItem)"
                    class="border p-2 rounded outline-none transition"
                    :class="hasDuplicateOrder(selectedItem.Order) ? 'border-red-500 bg-red-50' : ''"
                  />
                </div>
              </div>
              <div class="pt-2 flex gap-2">
                <button
                  @click="duplicateSelectedItem"
                  class="cursor-pointer w-1/2 bg-blue-50 hover:bg-blue-500 text-blue-600 hover:text-white font-semibold py-2 rounded border border-blue-200 transition"
                >
                  Duplizieren
                </button>
                <button
                  @click="deleteSelectedItem"
                  class="cursor-pointer w-1/2 bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-semibold py-2 rounded border border-red-200 transition"
                >
                  Löschen
                </button>
              </div>
            </div>
          </template>

          <template x-if="selectedItems.length > 1 && !selectedItem">
            <div class="space-y-4 h-full overflow-y-auto pb-4 no-select">
              <h2 class="text-lg font-semibold mb-2 text-gray-800">
                Gruppen-Bearbeitung
              </h2>
              <div
                class="bg-blue-100 border border-blue-200 text-blue-800 px-3 py-2 rounded text-sm font-semibold flex items-center justify-between shadow-sm"
              >
                <span><span x-text="selectedItems.length"></span> Items ausgewählt</span>
                <button
                  @click="selectedItems = []"
                  class="cursor-pointer text-blue-500 hover:text-blue-700 font-bold px-1"
                  title="Auswahl aufheben"
                >
                  ✕
                </button>
              </div>
              <div class="flex flex-col">
                <label class="text-sm font-medium text-gray-700"
                  >Item-ID (für Auswahl)</label
                >
                <select
                  @change="applyMulti('ItemId', $event.target.value)"
                  class="border p-2 rounded focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                >
                  <option value disabled selected>-- ItemId wählen --</option>
                  <template x-for="id in uniqueItemIds" :key="id"
                    ><option :value="id" x-text="id"></option
                  ></template>
                </select>
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700">X Rotation</label
                  ><input
                    type="number"
                    step="0.1"
                    @change="applyMulti('RX', parseFloat($event.target.value))"
                    placeholder="Neuer Winkel..."
                    class="border p-2 rounded transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700">Y Rotation</label
                  ><input
                    type="number"
                    step="0.1"
                    @change="applyMulti('RY', parseFloat($event.target.value))"
                    placeholder="Neuer Winkel..."
                    class="border p-2 rounded transition"
                  />
                </div>
                <div class="flex flex-col">
                  <label class="text-sm font-medium text-gray-700">Z Rotation</label
                  ><input
                    type="number"
                    step="0.1"
                    @change="applyMulti('RZ', parseFloat($event.target.value))"
                    placeholder="Neuer Winkel..."
                    class="border p-2 rounded transition"
                  />
                </div>
              </div>

              <div class="pt-3 mt-2 border-t border-gray-200">
                <label
                  class="text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2 block"
                  >Layout & Position</label
                >
                <div class="flex flex-col gap-2">
                  <div class="flex bg-gray-100 p-1 rounded-md border border-gray-200">
                    <button
                      @click="alignSelected('left')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                    >
                      L
                    </button>
                    <button
                      @click="alignSelected('right')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                    >
                      R
                    </button>
                    <div class="w-px bg-gray-400 mx-1 my-1"></div>
                    <button
                      @click="alignSelected('top')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                    >
                      O
                    </button>
                    <button
                      @click="alignSelected('bottom')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                    >
                      U
                    </button>
                    <div class="w-px bg-gray-400 mx-1 my-1"></div>
                    <button
                      @click="distributeSelected('horizontal')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                      title="H Vert."
                    >
                      ↔
                    </button>
                    <button
                      @click="distributeSelected('vertical')"
                      class="cursor-pointer flex-1 p-1.5 hover:bg-white text-gray-500 hover:text-blue-600 transition-all font-bold"
                      title="V Vert."
                    >
                      ↕
                    </button>
                  </div>
                </div>
              </div>
              <div class="pt-2">
                <button
                  @click="deleteSelectedItems"
                  class="cursor-pointer w-full bg-red-50 hover:bg-red-500 text-red-600 hover:text-white font-semibold py-2 rounded border border-red-200 transition shadow-sm"
                >
                  Alle markierten löschen
                </button>
              </div>
            </div>
          </template>

          <template x-if="!selectedItem && selectedItems.length === 0">
            <div
              class="h-full flex flex-col items-center justify-center text-center px-4 space-y-2"
            >
              <p class="text-gray-400 text-sm">
                Wähle ein Item in der 3D-Visualisierung aus oder markiere mehrere mit
                einem Rahmen, um deren Werte anzupassen.
              </p>
            </div>
          </template>
        </div>

        <div class="p-4 flex flex-col flex-1 overflow-hidden">
          <div class="flex justify-between items-center mb-3">
            <h2 class="text-lg font-semibold text-gray-800">
              Item-Liste (<span x-text="items.length"></span>)
            </h2>
            <button
              @click="addNewItem"
              class="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded shadow text-sm transition font-medium"
            >
              + Neues Item
            </button>
          </div>
          <div
            class="flex-1 overflow-y-auto border border-gray-200 rounded shadow-inner bg-white"
          >
            <ul class="divide-y divide-gray-100">
              <template
                x-for="item in [...items].sort((a, b) => (a.Order || 0) - (b.Order || 0))"
                :key="item.Id"
              >
                <li
                  x-show="!isHidden(item.ItemId)"
                  :id="'list-item-' + item.Id"
                  @click="handleItemClick($event, item)"
                  class="p-2 cursor-pointer transition-colors flex justify-between items-center hover:bg-blue-50"
                  :class="isSelected(item) ? 'bg-blue-50 border-l-4 border-blue-500' : (hasDuplicateOrder(item.Order) ? 'bg-red-50 border-l-4 border-red-500' : 'border-l-4 border-transparent')"
                >
                  <div class="flex items-center gap-3 w-full">
                    <div
                      class="w-2 h-2 rounded-full flex-none"
                      :style="`background-color: ${getItemColorClass(item.ItemId).hex}`"
                    ></div>
                    <div class="flex-1 flex items-center gap-2">
                      <div
                        class="font-bold text-sm"
                        :class="hasDuplicateOrder(item.Order) ? 'text-red-600' : 'text-gray-700'"
                      >
                        #<span x-text="item.Order"></span>
                      </div>
                      <div
                        class="text-xs text-gray-400 truncate w-24"
                        x-text="item.ItemId"
                      ></div>
                    </div>
                    <div
                      class="text-xs text-gray-500 border bg-white px-1.5 py-0.5 rounded shadow-sm"
                    >
                      X: <span x-text="item.X"></span> | Y: <span x-text="item.Y"></span>
                    </div>
                  </div>
                </li>
              </template>
            </ul>
          </div>
        </div>
      </div>
    </main>

    <div
      x-show="!jsonData"
      class="flex-1 flex flex-col items-center justify-center bg-gray-100 p-4 z-50 absolute inset-0 mt-[80px]"
    >
      <div
        class="text-center p-8 bg-white shadow-lg rounded-xl border border-gray-200 max-w-lg w-full"
      >
        <h3 class="text-2xl font-bold text-gray-900 mb-2">Neue Konfiguration starten</h3>
        <p class="text-gray-500 mb-6">
          Lade eine Container-JSON-Datei, um den 3D-Editor zu starten.
        </p>
        <button
          @click="document.getElementById('fileInput').click()"
          class="cursor-pointer w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg shadow transition mb-4"
        >
          Container-JSON-Datei auswählen
        </button>
      </div>
    </div>

    <script>
      function pickmasterApp() {
        // ==========================================
        // NON-REACTIVE THREE.JS GLOBALS
        // ==========================================
        let scene, camera, renderer, controls, planeMesh;
        let itemMeshes = new Map(); // Map<ItemId, THREE.Mesh>
        let raycaster = new THREE.Raycaster();
        let mouse = new THREE.Vector2();

        let draggedMesh = null;
        let dragOffset = new THREE.Vector3();
        let dragPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
        let isThreeDragging = false;

        // NEU: Hilfsfunktion für die Order-Nummer
        function createTextTexture(text) {
          const canvas = document.createElement('canvas');
          canvas.width = 256;
          canvas.height = 256;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          ctx.fillStyle = '#1f2937'; // Dunkelgraue Schrift
          ctx.font = 'bold 100px sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          ctx.fillText(text, 128, 128);
          return new THREE.CanvasTexture(canvas);
        }

        return {
          // ==========================================
          // ALPINE REACTIVE DATA
          // ==========================================
          jsonData: null,
          items: [],
          itemSizes: {},
          selectedItem: null,
          selectedItems: [],
          hiddenItemIds: {},
          currentMaxOrder: 0,
          width: 1000,
          height: 1000,
          uniqueItemIds: [],

          colorPalettes: [
            { hex: '#93C5FD' },
            { hex: '#86EFAC' },
            { hex: '#FDE047' },
            { hex: '#D8B4FE' },
            { hex: '#F9A8D4' },
            { hex: '#FDBA74' },
            { hex: '#5EEAD4' },
            { hex: '#A5B4FC' },
            { hex: '#FCA5A5' },
            { hex: '#67E8F9' },
            { hex: '#FDA4AF' },
            { hex: '#F0ABFC' },
            { hex: '#C4B5FD' },
            { hex: '#7DD3FC' },
            { hex: '#6EE7B7' },
            { hex: '#BEF264' },
          ],
          itemColors: {},

          dragMode: true,
          lastSaved: '',

          // 2D Box Selection Data
          isSelecting: false,
          selStartX: 0,
          selStartY: 0,
          selCurrentX: 0,
          selCurrentY: 0,

          init() {
            // Feuert nur noch beim allerersten Start
            this.$watch('jsonData', (value) => {
              if (value && !renderer) {
                this.updateMaxOrder();
                setTimeout(() => {
                  this.initThreeJS();
                }, 100);
              }
            });

            this.$watch('selectedItem', () => this.highlightThreeItems());
            this.$watch('selectedItems', () => this.highlightThreeItems());
            this.$watch('hiddenItemIds', () => this.updateThreeVisibility(), {
              deep: true,
            });

            // Kümmert sich um die Echtzeit-Positionen
            this.$watch(
              'items',
              (newItems) => {
                if (!scene) return;
                this.syncThreeMeshes();
              },
              { deep: true },
            );
          },

          // ----------------------------------------------------------------
          // THREE.JS LOGIK
          // (Hier wird jetzt auf die Variablen ganz oben referenziert)
          // ----------------------------------------------------------------
          initThreeJS() {
            const container = this.$refs.threeCanvas;
            if (!container || container.clientWidth === 0) return;
            container.innerHTML = '';

            scene = new THREE.Scene();
            scene.background = new THREE.Color('#e5e7eb');

            camera = new THREE.PerspectiveCamera(
              45,
              container.clientWidth / container.clientHeight,
              1,
              10000,
            );

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
            dirLight.position.set(this.width / 2, 1000, this.height / 2);
            dirLight.castShadow = true;
            dirLight.shadow.camera.left = -this.width / 2;
            dirLight.shadow.camera.right = this.width / 2;
            dirLight.shadow.camera.top = this.height / 2;
            dirLight.shadow.camera.bottom = -this.height / 2;
            scene.add(dirLight);

            const planeGeo = new THREE.PlaneGeometry(this.width, this.height);
            const planeMat = new THREE.MeshLambertMaterial({
              color: 0xffffff,
              side: THREE.DoubleSide,
            });
            planeMesh = new THREE.Mesh(planeGeo, planeMat);
            planeMesh.rotation.x = -Math.PI / 2;
            planeMesh.receiveShadow = true;
            scene.add(planeMesh);

            const gridHelper = new THREE.GridHelper(
              Math.max(this.width, this.height),
              20,
              0x0000ff,
              0xcccccc,
            );
            gridHelper.position.y = 1;
            scene.add(gridHelper);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.mouseButtons = {
              LEFT: THREE.MOUSE.NONE,
              MIDDLE: THREE.MOUSE.DOLLY,
              RIGHT: THREE.MOUSE.ROTATE,
            };

            this.resetCamera();
            this.setupThreeEvents(container);
            this.syncThreeMeshes();

            const animate = () => {
              requestAnimationFrame(animate);
              if (controls) controls.update();
              if (renderer && scene && camera) {
                renderer.render(scene, camera);
              }
            };
            animate();

            window.addEventListener('resize', () => {
              if (!camera || !renderer) return;
              camera.aspect = container.clientWidth / container.clientHeight;
              camera.updateProjectionMatrix();
              renderer.setSize(container.clientWidth, container.clientHeight);
            });
          },

          resetCamera() {
            if (!camera || !controls) return;
            camera.position.set(0, Math.max(this.width, this.height) * 1.2, 0);
            camera.lookAt(0, 0, 0);
            controls.target.set(0, 0, 0);
            controls.update();
          },

          mapToThreePos(x, y) {
            return { x: x - this.width / 2, z: y - this.height / 2 };
          },
          mapToAlpinePos(x, z) {
            return {
              x: parseFloat((x + this.width / 2).toFixed(1)),
              y: parseFloat((z + this.height / 2).toFixed(1)),
            };
          },

          syncThreeMeshes() {
            const currentIds = new Set(this.items.map((i) => i.Id));

            for (let [id, mesh] of itemMeshes.entries()) {
              if (!currentIds.has(id)) {
                scene.remove(mesh);
                mesh.geometry.dispose();
                mesh.material.dispose();
                itemMeshes.delete(id);
              }
            }

            this.items.forEach((item) => {
              if (!itemMeshes.has(item.Id)) this.createThreeMesh(item);
              else this.updateThreeMesh(item);
            });

            this.updateThreeVisibility();
            this.highlightThreeItems();
          },

          createThreeMesh(item) {
            const dims = this.getItemDimensions(item.ItemId);
            const depth = 20;
            const geo = new THREE.BoxGeometry(dims.x, depth, dims.y);
            const colorObj = this.getItemColorClass(item.ItemId);

            // 1. Transparentes Material
            const mat = new THREE.MeshLambertMaterial({
              color: colorObj.hex,
              transparent: true,
              opacity: 0.85,
            });

            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            mesh.receiveShadow = true;

            // Wichtige Daten speichern
            mesh.userData.alpineId = item.Id;
            mesh.userData.itemId = item.ItemId;
            mesh.userData.order = item.Order;

            // 2. Rahmen (Edges) hinzufügen
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(
              edges,
              new THREE.LineBasicMaterial({
                color: 0x000000,
                transparent: true,
                opacity: 0.4,
              }),
            );
            mesh.add(line);

            // 3. Text (Order Nummer) hinzufügen
            const textGeo = new THREE.PlaneGeometry(
              Math.min(dims.x, dims.y) * 0.8,
              Math.min(dims.x, dims.y) * 0.8,
            );
            const textMat = new THREE.MeshBasicMaterial({
              map: createTextTexture(item.Order.toString()),
              transparent: true,
              depthWrite: false,
            });
            const textPlane = new THREE.Mesh(textGeo, textMat);
            textPlane.rotation.x = -Math.PI / 2; // Liegend
            textPlane.position.y = depth / 2 + 0.5; // Minimal über der Box, damit es nicht flimmert
            textPlane.name = 'OrderText';
            mesh.add(textPlane);

            scene.add(mesh);
            itemMeshes.set(item.Id, mesh);
            this.updateThreeMesh(item);
          },

          updateThreeMesh(item) {
            const mesh = itemMeshes.get(item.Id);
            if (!mesh) return;

            // Wenn sich die ItemId (und damit evtl. die Größe) ändert,
            // bauen wir das Mesh komplett neu auf, damit Rahmen und Text nicht verzerren.
            if (mesh.userData.itemId !== item.ItemId) {
              scene.remove(mesh);
              mesh.geometry.dispose();
              mesh.material.dispose();
              itemMeshes.delete(item.Id);
              this.createThreeMesh(item);
              return;
            }

            // Text aktualisieren, falls sich die Order-Nummer ändert
            if (mesh.userData.order !== item.Order) {
              const textPlane = mesh.getObjectByName('OrderText');
              if (textPlane) {
                textPlane.material.map.dispose();
                textPlane.material.map = createTextTexture(item.Order.toString());
              }
              mesh.userData.order = item.Order;
            }

            const pos = this.mapToThreePos(item.X, item.Y);
            mesh.position.x = pos.x;
            mesh.position.z = pos.z;
            mesh.position.y = 10 + item.Order * 0.1;

            mesh.rotation.x = THREE.MathUtils.degToRad(item.RX || 0);
            mesh.rotation.z = THREE.MathUtils.degToRad(item.RZ || 0);
            mesh.rotation.y = THREE.MathUtils.degToRad(item.RY || 0);

            mesh.material.color.set(this.getItemColorClass(item.ItemId).hex);
          },

          updateThreeVisibility() {
            this.items.forEach((item) => {
              const mesh = itemMeshes.get(item.Id);
              if (mesh) mesh.visible = !this.isHidden(item.ItemId);
            });
          },

          highlightThreeItems() {
            const selectedIds = new Set(this.selectedItems.map((i) => i.Id));
            if (this.selectedItem) selectedIds.add(this.selectedItem.Id);

            this.items.forEach((item) => {
              const mesh = itemMeshes.get(item.Id);
              if (!mesh) return;
              if (selectedIds.has(item.Id)) mesh.material.emissive.setHex(0x550000);
              else mesh.material.emissive.setHex(0x000000);
            });
          },

          setupThreeEvents(container) {
            const getMousePos = (e) => {
              const rect = container.getBoundingClientRect();
              mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
              mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
            };

            container.addEventListener('pointerdown', (e) => {
              if (e.button !== 0) return;

              getMousePos(e);
              raycaster.setFromCamera(mouse, camera);

              const meshes = Array.from(itemMeshes.values()).filter((m) => m.visible);
              const intersects = raycaster.intersectObjects(meshes);

              if (intersects.length > 0) {
                const hitMesh = intersects[0].object;
                const clickedItem = this.items.find(
                  (i) => i.Id === hitMesh.userData.alpineId,
                );

                if (this.dragMode) {
                  isThreeDragging = true;
                  draggedMesh = hitMesh;
                  if (raycaster.ray.intersectPlane(dragPlane, dragOffset)) {
                    dragOffset.sub(hitMesh.position);
                  }
                  if (!this.selectedItems.some((i) => i.Id === clickedItem.Id)) {
                    this.selectItem(clickedItem);
                  }
                } else {
                  this.handleItemClick(e, clickedItem);
                }
                controls.enabled = false;
              } else {
                this.startSelectionOrDeselect(e);
              }
            });

            container.addEventListener('pointermove', (e) => {
              if (isThreeDragging && draggedMesh) {
                getMousePos(e);
                raycaster.setFromCamera(mouse, camera);

                const intersectPoint = new THREE.Vector3();
                if (raycaster.ray.intersectPlane(dragPlane, intersectPoint)) {
                  const targetPos = intersectPoint.clone().sub(dragOffset);
                  const dx = targetPos.x - draggedMesh.position.x;
                  const dz = targetPos.z - draggedMesh.position.z;

                  const itemsToMove =
                    this.selectedItems.length > 0
                      ? this.selectedItems
                      : this.selectedItem
                        ? [this.selectedItem]
                        : [];

                  itemsToMove.forEach((item) => {
                    const mesh = itemMeshes.get(item.Id);
                    if (mesh) {
                      mesh.position.x += dx;
                      mesh.position.z += dz;
                      const alpPos = this.mapToAlpinePos(
                        mesh.position.x,
                        mesh.position.z,
                      );
                      item.X = alpPos.x;
                      item.Y = alpPos.y;
                    }
                  });
                }
              } else if (this.isSelecting) {
                const rect = container.getBoundingClientRect();
                this.selCurrentX = e.clientX - rect.left;
                this.selCurrentY = e.clientY - rect.top;
              }
            });

            container.addEventListener('pointerup', (e) => {
              if (isThreeDragging) {
                isThreeDragging = false;
                draggedMesh = null;
                this.triggerAutosave();
              } else if (this.isSelecting) {
                this.stopDrag(container);
              }
              controls.enabled = true;
            });
          },

          // ----------------------------------------------------------------
          // RESTLICHE ALPINE FUNKTIONEN (Unverändert, bis auf stopDrag)
          // ----------------------------------------------------------------

          hasDuplicateOrder(orderNumber) {
            if (orderNumber === undefined || orderNumber === null || orderNumber === '')
              return false;
            let count = 0;
            for (let i = 0; i < this.items.length; i++) {
              if (this.items[i].Order === orderNumber) count++;
              if (count > 1) return true;
            }
            return false;
          },

          triggerAutosave() {
            this.lastSaved = new Date().toLocaleTimeString('de-DE', {
              hour: '2-digit',
              minute: '2-digit',
              second: '2-digit',
            });
          },
          toggleDragMode() {
            this.dragMode = !this.dragMode;
          },

          toggleVisibility(itemId) {
            const isNowHidden = !this.hiddenItemIds[itemId];
            this.hiddenItemIds = { ...this.hiddenItemIds, [itemId]: isNowHidden };
            if (isNowHidden) {
              this.selectedItems = this.selectedItems.filter((i) => i.ItemId != itemId);
              if (this.selectedItem && this.selectedItem.ItemId == itemId)
                this.selectedItem = null;
            }
          },
          isHidden(itemId) {
            return this.hiddenItemIds[itemId] === true;
          },
          isSelected(item) {
            return (
              (this.selectedItem && this.selectedItem.Id === item.Id) ||
              this.selectedItems.some((i) => i.Id === item.Id)
            );
          },

          startSelectionOrDeselect(e) {
            this.$nextTick(() => {
              this.selectedItem = null;
              this.selectedItems = [];
            });
            this.isSelecting = true;
            const container = this.$refs.threeCanvas;
            const rect = container.getBoundingClientRect();
            this.selStartX = e.clientX - rect.left;
            this.selStartY = e.clientY - rect.top;
            this.selCurrentX = this.selStartX;
            this.selCurrentY = this.selStartY;
          },

          stopDrag(container) {
            this.isSelecting = false;
            let minX = Math.min(this.selStartX, this.selCurrentX);
            let maxX = Math.max(this.selStartX, this.selCurrentX);
            let minY = Math.min(this.selStartY, this.selCurrentY);
            let maxY = Math.max(this.selStartY, this.selCurrentY);

            this.selectedItems = this.items.filter((item) => {
              if (this.isHidden(item.ItemId)) return false;
              const mesh = itemMeshes.get(item.Id);
              if (!mesh) return false;

              const posVector = mesh.position.clone();
              posVector.project(camera);

              const rect = container.getBoundingClientRect();
              const screenX = (posVector.x * 0.5 + 0.5) * rect.width;
              const screenY = (posVector.y * -0.5 + 0.5) * rect.height;

              return (
                screenX >= minX && screenX <= maxX && screenY >= minY && screenY <= maxY
              );
            });

            if (this.selectedItems.length === 1) this.selectItem(this.selectedItems[0]);
            else if (this.selectedItems.length > 1) this.selectedItem = null;
          },

          handleKeyDown(e) {
            if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'e') {
              e.preventDefault();
              if (this.jsonData) this.saveFile();
              return;
            }
            if (e.key === 'Escape') {
              e.preventDefault();
              if (
                document.activeElement &&
                typeof document.activeElement.blur === 'function'
              )
                document.activeElement.blur();
              this.$nextTick(() => {
                this.selectedItem = null;
                this.selectedItems = [];
                this.isSelecting = false;
              });
              return;
            }
            if (!this.selectedItem && this.selectedItems.length === 0) return;
            const activeTag = document.activeElement.tagName.toUpperCase();
            if (['INPUT', 'TEXTAREA', 'SELECT'].includes(activeTag)) return;

            if (e.key === 'Delete' || e.key === 'Backspace') {
              e.preventDefault();
              if (this.selectedItem) this.deleteSelectedItem();
              else this.deleteSelectedItems();
              return;
            }
          },

          loadFile(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
              try {
                this.jsonData = JSON.parse(e.target.result);
                this.items =
                  this.jsonData.ContainerPattern.Layers.$values[0].ArrangedItems.$values;
                if (this.jsonData.Size) {
                  this.width = this.jsonData.Size.x;
                  this.height = this.jsonData.Size.y;
                }
                this.extractItemIdsAndAssignColors();
                this.updateMaxOrder();
                this.selectedItem = null;
                this.selectedItems = [];

                // NEU: Wenn schon eine 3D-Szene existiert, setze die Kamera GANZ GEZIELT zurück
                if (renderer) {
                  setTimeout(() => {
                    this.resetCamera();
                  }, 100);
                }
              } catch (error) {
                alert('Fehler beim Lesen der Container-JSON.');
              }
            };
            reader.readAsText(file);
          },

          loadItemFiles(event) {
            const files = event.target.files;
            if (!files.length) return;
            Array.from(files).forEach((file) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                try {
                  const itemData = JSON.parse(e.target.result);
                  if (itemData.Id && itemData.Size) {
                    this.itemSizes = {
                      ...this.itemSizes,
                      [itemData.Id]: { x: itemData.Size.x, y: itemData.Size.y },
                    };
                    this.syncThreeMeshes();
                  }
                } catch (error) {}
              };
              reader.readAsText(file);
            });
          },

          getItemDimensions(itemId) {
            if (this.itemSizes[itemId]) return this.itemSizes[itemId];
            return { x: 88, y: 52 };
          },

          extractItemIdsAndAssignColors() {
            const ids = new Set();
            this.items.forEach((item) => ids.add(item.ItemId));
            this.uniqueItemIds = Array.from(ids);
            this.itemColors = {};
            this.uniqueItemIds.forEach((id, index) => {
              this.itemColors[id] = this.colorPalettes[index % this.colorPalettes.length];
            });
          },

          getItemColorClass(itemId) {
            if (this.itemColors[itemId]) return this.itemColors[itemId];
            return { hex: '#9CA3AF' };
          },

          selectItem(item) {
            this.selectedItem = item;
            this.selectedItems = [];
            this.$nextTick(() => {
              const listItem = document.getElementById('list-item-' + item.Id);
              if (listItem)
                listItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
          },

          handleItemClick(e, item) {
            if (e.shiftKey) {
              if (this.selectedItem) {
                this.selectedItems = [this.selectedItem];
                this.selectedItem = null;
              }
              const index = this.selectedItems.findIndex((i) => i.Id === item.Id);
              if (index > -1) this.selectedItems.splice(index, 1);
              else this.selectedItems.push(item);
              if (this.selectedItems.length === 1) this.selectItem(this.selectedItems[0]);
              else if (this.selectedItems.length === 0) this.selectedItem = null;
            } else {
              this.selectItem(item);
            }
          },

          applyMulti(property, value) {
            if (value === '' || (isNaN(value) && property === 'RZ')) return;
            this.selectedItems.forEach((item) => {
              item[property] = value;
              this.updateThreeMesh(item);
            });
            this.triggerAutosave();
          },

          alignSelected(direction) {
            if (this.selectedItems.length < 2) return;
            let targetValue;
            if (direction === 'left') {
              targetValue = Math.min(...this.selectedItems.map((i) => i.X));
              this.selectedItems.forEach((i) => {
                i.X = targetValue;
                this.updateThreeMesh(i);
              });
            } else if (direction === 'right') {
              targetValue = Math.max(...this.selectedItems.map((i) => i.X));
              this.selectedItems.forEach((i) => {
                i.X = targetValue;
                this.updateThreeMesh(i);
              });
            } else if (direction === 'top') {
              targetValue = Math.min(...this.selectedItems.map((i) => i.Y));
              this.selectedItems.forEach((i) => {
                i.Y = targetValue;
                this.updateThreeMesh(i);
              });
            } else if (direction === 'bottom') {
              targetValue = Math.max(...this.selectedItems.map((i) => i.Y));
              this.selectedItems.forEach((i) => {
                i.Y = targetValue;
                this.updateThreeMesh(i);
              });
            }
            this.triggerAutosave();
          },

          distributeSelected(axis) {
            if (this.selectedItems.length < 3) return;
            if (axis === 'horizontal') {
              const sorted = [...this.selectedItems].sort((a, b) => a.X - b.X);
              const minX = sorted[0].X;
              const maxX = sorted[sorted.length - 1].X;
              const step = (maxX - minX) / (sorted.length - 1);
              sorted.forEach((item, index) => {
                item.X = parseFloat((minX + index * step).toFixed(1));
                this.updateThreeMesh(item);
              });
            } else if (axis === 'vertical') {
              const sorted = [...this.selectedItems].sort((a, b) => a.Y - b.Y);
              const minY = sorted[0].Y;
              const maxY = sorted[sorted.length - 1].Y;
              const step = (maxY - minY) / (sorted.length - 1);
              sorted.forEach((item, index) => {
                item.Y = parseFloat((minY + index * step).toFixed(1));
                this.updateThreeMesh(item);
              });
            }
            this.triggerAutosave();
          },

          generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function (c) {
              const r = (Math.random() * 16) | 0,
                v = c == 'x' ? r : (r & 0x3) | 0x8;
              return v.toString(16);
            });
          },

          addNewItem() {
            const newItem = {
              $type:
                'PickMaster.Core.Process.Container.ArrangedItemModel, PickMaster.Core',
              ItemId: this.uniqueItemIds.length > 0 ? this.uniqueItemIds[0] : '',
              X: parseFloat((this.width / 2).toFixed(1)),
              Y: parseFloat((this.height / 2).toFixed(1)),
              Z: 0.0,
              RX: 0.0,
              RY: 0.0,
              RZ: 0.0,
              Order: this.currentMaxOrder + 1,
              Id: this.generateUUID(),
            };
            this.items.push(newItem);
            this.selectItem(newItem);
          },

          duplicateSelectedItem() {
            if (!this.selectedItem) return;
            const clonedItem = {
              ...JSON.parse(JSON.stringify(this.selectedItem)),
              X: parseFloat((this.selectedItem.X + 20).toFixed(1)),
              Y: parseFloat((this.selectedItem.Y + 20).toFixed(1)),
              Order: this.currentMaxOrder + 1,
              Id: this.generateUUID(),
            };
            this.items.push(clonedItem);
            this.selectItem(clonedItem);
          },

          deleteSelectedItem() {
            if (!this.selectedItem) return;
            if (confirm('Dieses Item wirklich löschen?')) {
              const index = this.items.findIndex((i) => i.Id === this.selectedItem.Id);
              if (index > -1) this.items.splice(index, 1);
              this.selectedItem = null;
            }
          },

          deleteSelectedItems() {
            if (confirm(`${this.selectedItems.length} Items wirklich löschen?`)) {
              const idsToDelete = this.selectedItems.map((i) => i.Id);
              for (let i = this.items.length - 1; i >= 0; i--) {
                if (idsToDelete.includes(this.items[i].Id)) this.items.splice(i, 1);
              }
              this.selectedItems = [];
            }
          },

          saveFile() {
            const dataStr = JSON.stringify(this.jsonData, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = this.jsonData.Name
              ? `${this.jsonData.Name}_mod.json`
              : 'ContainerModel_mod.json';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
          },

          updateMaxOrder() {
            this.currentMaxOrder =
              this.items.length > 0
                ? Math.max(...this.items.map((i) => i.Order || 0))
                : 0;
          },
        };
      }
    </script>
  </body>
</html>
